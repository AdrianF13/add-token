<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add USDT Token</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #1e1e2e;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #7c3aed;
        }
        h2 { font-size: 20px; margin-bottom: 8px; }
        .symbol { font-size: 14px; color: #8888a0; margin-bottom: 4px; }
        .network-info {
            font-size: 12px;
            color: #f59e0b;
            margin-bottom: 24px;
            padding: 6px 14px;
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 20px;
            display: inline-block;
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .btn:hover {
            background: #8b5cf6;
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.4);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hint {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        .error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
        }
        .success {
            color: #22c55e;
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">💎</div>
        <h2>Tether USD</h2>
        <div class="symbol">USDT</div>
        <div class="network-info">⚠ BSC Mainnet — Chain ID 56</div>
        <button class="btn" id="addBtn">Add USDT to Wallet</button>
        <div id="status"></div>
        <div class="hint">
            Make sure your wallet is connected to<br>
            <strong>BSC Mainnet</strong> before clicking.
        </div>
    </div>
    <script>
        const btn = document.getElementById('addBtn');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = 'Adding...';
            status.innerHTML = '';

            try {
                const wasAdded = await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x84F0a2346937Ca8D85BC8505BAfba4D4969dA6b4',
                            symbol: 'USDT',
                            decimals: 18,
                            image: ''
                        }
                    }
                });

                if (wasAdded) {
                    status.className = 'success';
                    status.textContent = '✓ Token added successfully! Check your wallet.';
                    btn.textContent = 'Token Added ✓';
                    btn.style.background = '#22c55e';
                } else {
                    status.className = 'error';
                    status.textContent = 'Token was not added. Please try again.';
                    btn.disabled = false;
                    btn.textContent = 'Add USDT to Wallet';
                }
            } catch (err) {
                status.className = 'error';
                status.textContent = 'Error: ' + err.message;
                btn.disabled = false;
                btn.textContent = 'Add USDT to Wallet';
            }
        });
    </script>
</body>
</html>
